# Email Hierarchical Classification Workflow
# Classifies the latest user-provided email text into HR, finance, or education.
# Finance invoice emails are enriched with seller company extraction and stakeholder lookup.

id: email-hierarchical-classification-with-finance-enrichment
version: 1.0.0

metadata:
  name: "Email Hierarchical Classification With Finance Enrichment"
  description: "Deterministic email classification with finance subtype routing and invoice stakeholder lookup"
  tags: ["example", "email-classification", "hierarchical-classification", "finance", "hr", "education"]

entry_node: detect_email_domain

nodes:
  - id: detect_email_domain
    name: "Detect Email Domain"
    node_type:
      llm_call:
        model: azure/gpt-4.1-mini
        temperature: 0.0
        messages_path: input.messages
        append_prompt_as_user: true
    config:
      output_schema:
        type: object
        properties:
          domain:
            type: string
            enum: [hr, finance, education]
          reason:
            type: string
        required: [domain, reason]
        additionalProperties: false
      prompt: |
        Classify the latest user-provided email content into exactly one top-level domain.

        Return JSON only:
        {
          "domain": "hr" | "finance" | "education",
          "reason": "short explanation"
        }

        Rules:
        - Use the latest user message in the chat as the email content to classify.
        - Choose "hr" for employee matters, hiring, leave, payroll support, people operations, or workplace policy topics.
        - Choose "finance" for reimbursement, tax, invoice, filing, insurance, payment, billing, or accounting topics.
        - Choose "education" for courses, training, assessments, classes, student matters, curriculum, or academic administration topics.
        - Pick the single best domain even if the email mentions adjacent business context.
        - Do not invent details that are not present in the email.

  - id: route_email_domain
    name: "Route Email Domain"
    node_type:
      switch:
        branches:
          - condition: '$.nodes.detect_email_domain.output.domain == "hr"'
            target: finalize_hr_classification
          - condition: '$.nodes.detect_email_domain.output.domain == "finance"'
            target: detect_finance_subtype
        default: finalize_education_classification

  - id: detect_finance_subtype
    name: "Detect Finance Subtype"
    node_type:
      llm_call:
        model: azure/gpt-4.1-mini
        temperature: 0.0
        messages_path: input.messages
        append_prompt_as_user: true
    config:
      output_schema:
        type: object
        properties:
          finance_subtype:
            type: string
            enum: [reimbursement, tax, invoice, filing, insurance]
          reason:
            type: string
        required: [finance_subtype, reason]
        additionalProperties: false
      prompt: |
        The latest user message has already been classified as finance.
        Classify it into exactly one finance subtype.

        Return JSON only:
        {
          "finance_subtype": "reimbursement" | "tax" | "invoice" | "filing" | "insurance",
          "reason": "short explanation"
        }

        Rules:
        - reimbursement: expense claims, employee repayment requests, receipts for reimbursement, or travel expense recovery.
        - tax: tax calculations, GST/VAT/sales tax matters, withholding, tax forms, or tax review questions.
        - invoice: vendor invoices, bills, payable notices, billing statements, or payment requests from suppliers.
        - filing: bookkeeping entries, statutory filing preparation, record submission, or document filing tasks not primarily about tax.
        - insurance: policy renewals, claims, coverage questions, insurer correspondence, or premium/payment questions related to insurance.
        - Pick the single best subtype from the enum.

  - id: route_finance_subtype
    name: "Route Finance Subtype"
    node_type:
      switch:
        branches:
          - condition: '$.nodes.detect_finance_subtype.output.finance_subtype == "invoice"'
            target: extract_invoice_company_name
        default: finalize_finance_classification

  - id: extract_invoice_company_name
    name: "Extract Invoice Company Name"
    node_type:
      llm_call:
        model: azure/gpt-4.1-mini
        temperature: 0.0
        messages_path: input.messages
        append_prompt_as_user: true
    config:
      output_schema:
        type: object
        properties:
          company_name:
            type: string
          reason:
            type: string
        required: [company_name, reason]
        additionalProperties: false
      prompt: |
        The latest user message is already classified as a finance invoice email.
        Extract the seller-side company name associated with the invoice.

        Return JSON only:
        {
          "company_name": "seller company name from the email or unknown",
          "reason": "short explanation"
        }

        Rules:
        - Extract the invoicing company, seller, vendor, merchant, supplier, or invoice issuer.
        - Prefer the company explicitly labeled as seller, vendor, supplier, from, or account name when it clearly refers to the payee.
        - Do not return the buyer, customer, recipient, or bill-to company unless it is clearly also the seller.
        - If no seller-side company name is clearly stated, return "unknown".
        - Do not invent a company name.

  - id: lookup_invoice_stakeholder
    name: "Lookup Invoice Stakeholder"
    node_type:
      custom_worker:
        language: javascript
        handler: get_seller_name
    config:
      payload: "{{ nodes.extract_invoice_company_name.output.company_name }}"

  - id: finalize_hr_classification
    name: "Finalize HR Classification"
    node_type:
      llm_call:
        model: azure/gpt-4.1-mini
        temperature: 0.0
        messages_path: input.messages
        append_prompt_as_user: true
    config:
      output_schema:
        type: object
        properties:
          top_level_category:
            type: string
            enum: [hr]
          subtype:
            type: string
            enum: [general]
          label:
            type: string
            enum: [hr/general]
          reason:
            type: string
        required: [top_level_category, subtype, label, reason]
        additionalProperties: false
      prompt: |
        Produce the final normalized classification for an hr email.

        Return JSON only:
        {
          "top_level_category": "hr",
          "subtype": "general",
          "label": "hr/general",
          "reason": "short explanation"
        }

        Rules:
        - Use this node only when the top-level domain is hr.
        - Keep subtype fixed as "general".
        - Keep label fixed as "hr/general".
        - Keep the reason aligned with the detected top-level classification.

        Detected domain reason: {{ nodes.detect_email_domain.output.reason }}

  - id: finalize_education_classification
    name: "Finalize Education Classification"
    node_type:
      llm_call:
        model: azure/gpt-4.1-mini
        temperature: 0.0
        messages_path: input.messages
        append_prompt_as_user: true
    config:
      output_schema:
        type: object
        properties:
          top_level_category:
            type: string
            enum: [education]
          subtype:
            type: string
            enum: [general]
          label:
            type: string
            enum: [education/general]
          reason:
            type: string
        required: [top_level_category, subtype, label, reason]
        additionalProperties: false
      prompt: |
        Produce the final normalized classification for an education email.

        Return JSON only:
        {
          "top_level_category": "education",
          "subtype": "general",
          "label": "education/general",
          "reason": "short explanation"
        }

        Rules:
        - Use this node only when the top-level domain is education.
        - Keep subtype fixed as "general".
        - Keep label fixed as "education/general".
        - Keep the reason aligned with the detected top-level classification.

        Detected domain reason: {{ nodes.detect_email_domain.output.reason }}

  - id: finalize_finance_classification
    name: "Finalize Finance Classification"
    node_type:
      llm_call:
        model: azure/gpt-4.1-mini
        temperature: 0.0
        messages_path: input.messages
        append_prompt_as_user: true
    config:
      output_schema:
        type: object
        properties:
          top_level_category:
            type: string
            enum: [finance]
          subtype:
            type: string
            enum: [reimbursement, tax, invoice, filing, insurance]
          label:
            type: string
          reason:
            type: string
        required: [top_level_category, subtype, label, reason]
        additionalProperties: false
      prompt: |
        Produce the final normalized classification for a finance email that is not enriched with invoice stakeholder data.

        Return JSON only:
        {
          "top_level_category": "finance",
          "subtype": "reimbursement" | "tax" | "invoice" | "filing" | "insurance",
          "label": "finance/<subtype>",
          "reason": "short explanation"
        }

        Rules:
        - Set top_level_category to "finance".
        - Set subtype to the previously detected finance subtype.
        - Set label to "finance/" followed by the subtype.
        - Keep the reason concise and aligned with the detected subtype.

        Detected finance subtype: {{ nodes.detect_finance_subtype.output.finance_subtype }}
        Detection reason: {{ nodes.detect_finance_subtype.output.reason }}

  - id: finalize_invoice_classification
    name: "Finalize Invoice Classification"
    node_type:
      llm_call:
        model: azure/gpt-4.1-mini
        temperature: 0.0
        messages_path: input.messages
        append_prompt_as_user: true
    config:
      output_schema:
        type: object
        properties:
          top_level_category:
            type: string
            enum: [finance]
          subtype:
            type: string
            enum: [invoice]
          label:
            type: string
            enum: [finance/invoice]
          company_name:
            type: string
          stakeholder_name:
            type: string
          reason:
            type: string
        required: [top_level_category, subtype, label, company_name, stakeholder_name, reason]
        additionalProperties: false
      prompt: |
        Produce the final normalized classification for an invoice email.

        Return JSON only:
        {
          "top_level_category": "finance",
          "subtype": "invoice",
          "label": "finance/invoice",
          "company_name": "extracted company name",
          "stakeholder_name": "stakeholder returned by lookup",
          "reason": "short explanation"
        }

        Rules:
        - Set top_level_category to "finance".
        - Set subtype to "invoice".
        - Set label to "finance/invoice".
        - Set company_name to the previously extracted company name.
        - Set stakeholder_name to the stakeholder string returned by the custom worker.
        - Keep the reason concise and aligned with invoice classification.

        Finance subtype reason: {{ nodes.detect_finance_subtype.output.reason }}
        Extracted company name: {{ nodes.extract_invoice_company_name.output.company_name }}
        Company extraction reason: {{ nodes.extract_invoice_company_name.output.reason }}
        Stakeholder lookup result: {{ nodes.lookup_invoice_stakeholder.output }}

edges:
  - from: detect_email_domain
    to: route_email_domain

  - from: detect_finance_subtype
    to: route_finance_subtype

  - from: extract_invoice_company_name
    to: lookup_invoice_stakeholder

  - from: lookup_invoice_stakeholder
    to: finalize_invoice_classification
